name: Cloudflare Workers へデプロイ

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    env:
      ASTRO_TELEMETRY_DISABLED: '1'
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          check-latest: true

      - name: Bun をセットアップ
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: 依存関係をインストール
        run: bun install --frozen-lockfile

      - name: ImageMagick をインストール
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: X カード画像を生成
        env:
          X_CARD_BASE_REF: ${{ github.event.before }}
          X_CARD_HEAD_REF: ${{ github.sha }}
        run: bun run x-card

      - name: 型チェック
        run: bun run check

      - name: 変更をコミット
        id: commit_x_card
        run: |
          if git diff --quiet --exit-code -- src/content/blog public; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/blog public
          git commit -m "feat: Xカードを設定"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: 変更を push
        if: steps.commit_x_card.outputs.committed == 'true'
        run: |
          git push origin HEAD:${{ github.ref_name }}

      - name: デプロイ
        run: ./deploy.sh
